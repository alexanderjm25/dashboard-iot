<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard IoT ESP32</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#111827;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
}

h1{
    text-align:center;
    padding:20px;
}

.estado{
    text-align:center;
    font-size:18px;
    margin-bottom:20px;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
    padding:20px;
}

.card{
    background:#1f2937;
    width:300px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.valor{
    font-size:42px;
    font-weight:bold;
    margin-top:15px;
}

canvas{
    width:250px !important;
    height:250px !important;
}

</style>

</head>

<body>

<h1>Dashboard IoT ESP32</h1>

<div class="estado" id="estado">
🔴 Desconectado
</div>

<div class="container">

    <div class="card">
        <h2>🌡 Temperatura</h2>
        <canvas id="tempGauge"></canvas>
        <div class="valor" id="tempValue">0 °C</div>
    </div>

    <div class="card">
        <h2>💧 Humedad</h2>
        <canvas id="humGauge"></canvas>
        <div class="valor" id="humValue">0 %</div>
    </div>

    <div class="card">
        <h2>🌫 CO₂</h2>
        <canvas id="co2Gauge"></canvas>
        <div class="valor" id="co2Value">0 ppm</div>
    </div>

</div>

<script>

// ======================================
// CONFIGURACION ADAFRUIT
// ======================================

const AIO_USERNAME = "alex25";
const AIO_KEY = "aio_iDYW21xLM3p2K2ldpHrUrgn41ceD";

// ======================================
// CREAR GAUGES
// ======================================

function crearGauge(id,maximo){

    return new Chart(document.getElementById(id),{

        type:'doughnut',

        data:{
            datasets:[{
                data:[0,maximo],
                backgroundColor:[
                    '#22c55e',
                    '#374151'
                ],
                borderWidth:0
            }]
        },

        options:{
            responsive:true,
            rotation:270,
            circumference:180,

            plugins:{
                legend:false,
                tooltip:false
            }
        }

    });

}

const gaugeTemp = crearGauge("tempGauge",50);
const gaugeHum = crearGauge("humGauge",100);
const gaugeCO2 = crearGauge("co2Gauge",2000);

// ======================================
// ACTUALIZAR GAUGE
// ======================================

function actualizarGauge(gauge, valor, maximo){

    valor = Number(valor);

    if(valor < 0) valor = 0;
    if(valor > maximo) valor = maximo;

    gauge.data.datasets[0].data = [
        valor,
        maximo - valor
    ];

    gauge.update();

}

// ======================================
// MQTT ADAFRUIT
// ======================================

const client = mqtt.connect(
    "wss://io.adafruit.com:443/mqtt",
    {
        username: AIO_USERNAME,
        password: AIO_KEY,

        clientId:
        "web_" +
        Math.random().toString(16).substr(2,8),

        protocolVersion:4,

        clean:true,

        reconnectPeriod:5000
    }
);

// ======================================
// CONECTADO
// ======================================

client.on("connect", () => {

    console.log("MQTT conectado");

    document.getElementById("estado").innerHTML =
    "🟢 Conectado a Adafruit IO";

    client.subscribe(
        AIO_USERNAME + "/feeds/sensores"
    );

    client.subscribe(
        AIO_USERNAME + "/feeds/sensores/get"
    );

    client.publish(
        AIO_USERNAME + "/feeds/sensores/get",
        ""
    );

});

// ======================================
// MENSAJES
// ======================================

client.on("message", (topic, message) => {

    try{

        console.log(
            "TOPIC:",
            topic
        );

        console.log(
            "MENSAJE:",
            message.toString()
        );

        const data =
        JSON.parse(
            message.toString()
        );

        document.getElementById(
            "tempValue"
        ).innerHTML =
        data.temperatura + " °C";

        document.getElementById(
            "humValue"
        ).innerHTML =
        data.humedad + " %";

        document.getElementById(
            "co2Value"
        ).innerHTML =
        data.co2 + " ppm";

        actualizarGauge(
            gaugeTemp,
            data.temperatura,
            50
        );

        actualizarGauge(
            gaugeHum,
            data.humedad,
            100
        );

        actualizarGauge(
            gaugeCO2,
            data.co2,
            2000
        );

    }
    catch(error){

        console.log(
            "Error JSON:",
            error
        );

    }

});

// ======================================
// ERROR
// ======================================

client.on("error", (err) => {

    console.log(err);

    document.getElementById("estado").innerHTML =
    "🔴 Error MQTT";

});

// ======================================
// OFFLINE
// ======================================

client.on("offline", () => {

    document.getElementById("estado").innerHTML =
    "🟠 Reconectando...";

});

</script>

</body>
</html>
